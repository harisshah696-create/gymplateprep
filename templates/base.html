<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <meta name="description" content="{{ description }}">
    <meta name="author" content="GymPlatePrep">
    <link rel="canonical" href="{{ canonical_url }}">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">

    <!-- Open Graph -->
    <meta property="og:title" content="{{ page_title }}">
    <meta property="og:description" content="{{ description }}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{ canonical_url }}">

    <!-- Schema -->
    <script type="application/ld+json">
    {{ schema }}
    </script>

    <!-- ── Google Search Console (uncomment after verifying ownership) ── -->
    <!-- <meta name="google-site-verification" content="YOUR_VERIFICATION_CODE"> -->

    <!-- ── Google Analytics ── -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-THTK68VRR3"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-THTK68VRR3');
    </script>

    <!-- Styles -->
    <link rel="stylesheet" href="/css/style.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Dark mode: apply saved/preferred theme before paint -->
    <script>
    (function() {
        var theme = localStorage.getItem('gymplateprep-theme');
        if (!theme) {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);
    })();
    </script>
</head>
<body>
    <!-- Reading progress bar -->
    <div id="readingProgress" class="reading-progress" role="progressbar" aria-label="Reading progress"></div>

    <header class="site-header">
        <div class="container">
            <a href="/" class="site-logo">
                <span class="site-logo__icon">&#x1f4aa;</span>
                <span class="site-logo__text">{{ site_title }}</span>
            </a>
            <div class="site-nav-group">
                <nav class="site-nav" aria-label="Main navigation">
                    {{ nav_links }}
                </nav>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" type="button">
                    <svg class="theme-toggle__icon theme-toggle__moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                    <svg class="theme-toggle__icon theme-toggle__sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            {{ content }}
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col">
                    <h3>{{ site_title }}</h3>
                    <p>{{ description }}</p>
                </div>
                <div class="footer-col">
                    <h3>Quick Links</h3>
                    <ul>
                        <li><a href="/">Home</a></li>
                        <li><a href="/posts/complete-guide-gym-nutrition-muscle-gain.html">Nutrition Guide</a></li>
                    </ul>
                </div>
                <div class="footer-col">
                    <h3>Affiliate Disclosure</h3>
                    <p>Some links on this site are affiliate links. We may earn a commission at no extra cost to you.</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; {{ year }} {{ site_title }}. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
    (function() {
        // ── Dark mode toggle ──
        var toggle = document.getElementById('themeToggle');
        if (toggle) {
            toggle.addEventListener('click', function() {
                var html = document.documentElement;
                var current = html.getAttribute('data-theme');
                var next = current === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', next);
                try { localStorage.setItem('gymplateprep-theme', next); } catch (e) {}
            });
        }

        // ── Reading progress bar ──
        var progressBar = document.getElementById('readingProgress');
        if (progressBar) {
            var ticking = false;
            window.addEventListener('scroll', function() {
                if (!ticking) {
                    window.requestAnimationFrame(function() {
                        var scrollTop = window.scrollY;
                        var docHeight = document.documentElement.scrollHeight - window.innerHeight;
                        var progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
                        progressBar.style.width = progress + '%';
                        ticking = false;
                    });
                    ticking = true;
                }
            });
        }
    })();
    </script>

    <!-- EmailJS (client-side email delivery) -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="/js/email-capture.js"></script>
</body>
</html>
